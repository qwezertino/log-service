services:
  # ── MinIO bucket initializer (runs once, connects to external minio) ─────────
  # MinIO itself lives in the separate minio-infra project.
  oo-init:
    image: minio/mc:latest
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      OO_BUCKET: ${OO_BUCKET:-openobserve-logs}
    entrypoint: >
      /bin/sh -c "
        until mc alias set local $$MINIO_ENDPOINT $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
          echo 'Waiting for MinIO...'; sleep 3;
        done &&
        mc mb --ignore-existing local/$$OO_BUCKET
      "
    restart: "on-failure"
    networks:
      - ndvi-go-net

  # ── OpenObserve ─────────────────────────────────────────────────────────────
  # Web UI: http://localhost:5080
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    restart: unless-stopped
    labels:
      logging.exclude: "true"
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD}
      # Use MinIO as S3-compatible object storage backend.
      # ZO_LOCAL_MODE=true keeps single-node (SQLite meta).
      # ZO_LOCAL_MODE_STORAGE=s3 makes parquet data go to S3 instead of local disk.
      ZO_LOCAL_MODE: ${ZO_LOCAL_MODE:-true}
      ZO_LOCAL_MODE_STORAGE: ${ZO_LOCAL_MODE_STORAGE:-s3}
      ZO_S3_PROVIDER: ${ZO_S3_PROVIDER:-minio}
      ZO_S3_SERVER_URL: ${MINIO_ENDPOINT}
      ZO_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      ZO_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ZO_S3_BUCKET_NAME: ${OO_BUCKET:-openobserve-logs}
      ZO_S3_REGION_NAME: ${ZO_S3_REGION_NAME:-us-east-1}
      ZO_COMPACT_DATA_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-90}
      ZO_COMPACT_INTERVAL: ${ZO_COMPACT_INTERVAL:-1}
      ZO_FILE_PUSH_INTERVAL: ${ZO_FILE_PUSH_INTERVAL:-5}
      ZO_MAX_FILE_RETENTION_TIME: ${ZO_MAX_FILE_RETENTION_TIME:-60}
      ZO_MEM_PERSIST_INTERVAL: ${ZO_MEM_PERSIST_INTERVAL:-2}
    ports:
      - "${HOST_PORT_OO:-5080}:5080"
    volumes:
      - oo-data:/data
    depends_on:
      oo-init:
        condition: service_completed_successfully
    networks:
      - log-net
      - ndvi-go-net

  # ── Vector ──────────────────────────────────────────────────────────────────
  # Reads logs from Docker daemon, forwards to OpenObserve
  vector:
    image: timberio/vector:0.44.0-alpine
    restart: unless-stopped
    command: ["--config", "/etc/vector/vector.toml"]
    labels:
      logging.exclude: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./vector.toml:/etc/vector/vector.toml:ro
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD}
    depends_on:
      - openobserve
    networks:
      - log-net

networks:
  log-net:
  ndvi-go-net:
    external: true

volumes:
  oo-data:
