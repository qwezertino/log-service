services:
  # ── OpenObserve ─────────────────────────────────────────────────────────────
  # Web UI: http://localhost:5080
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD}
      # Use existing MinIO as object storage backend
      ZO_STORAGE_TYPE: s3
      ZO_S3_SERVER_URL: ${MINIO_ENDPOINT}
      ZO_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      ZO_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ZO_S3_BUCKET_NAME: ${OO_BUCKET:-openobserve-logs}
      ZO_S3_FORCE_PATH_STYLE: "true"
      ZO_S3_REGION_NAME: us-east-1
      ZO_COMPACT_DATA_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-90}
    ports:
      - "${HOST_PORT_OO:-5080}:5080"
    networks:
      - log-net

  # ── Vector ──────────────────────────────────────────────────────────────────
  # Reads logs from Docker daemon, forwards to OpenObserve
  vector:
    image: timberio/vector:0.44.0-alpine
    restart: unless-stopped
    command: ["--config", "/etc/vector/vector.toml"]
    labels:
      logging.exclude: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./vector.toml:/etc/vector/vector.toml:ro
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD}
    depends_on:
      - openobserve
    networks:
      - log-net

networks:
  log-net:
